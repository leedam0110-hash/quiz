<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/quiz.css">
</head>
<body>

<!-- Admin Icons (always visible) -->
<div class="admin-icons">
  <div class="admin-icon" id="icon-stats" title="통계 보기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
  </div>
  <div class="admin-icon" id="icon-builder" title="퀴즈 만들기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </div>
</div>

<!-- Password Modal -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h3>🔒 관리자 인증</h3>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" maxlength="10" inputmode="numeric"/>
    <div class="modal-err" id="pw-err"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closePwModal()">취소</button>
      <button class="btn btn-primary" onclick="checkPassword()">확인</button>
    </div>
  </div>
</div>

<!-- Quiz Type Select Modal -->
<div class="type-select-overlay" id="type-modal">
  <div class="type-select-box">
    <h3>퀴즈 유형 선택</h3>
    <div class="type-btns">
      <div class="type-btn" onclick="addQuestion('short')">
        <div class="type-icon">✏️</div>
        주관식
      </div>
      <div class="type-btn" onclick="addQuestion('multi')">
        <div class="type-icon">☑️</div>
        객관식
      </div>
    </div>
    <div style="margin-top:1rem">
      <button class="btn btn-ghost full-w" onclick="closeTypeModal()">취소</button>
    </div>
  </div>
</div>

<!-- ── START PAGE ── -->
<div class="page active" id="page-start">
  <div class="start-inner">
    <div class="start-title">QUIZ</div>
    <div class="start-sub">준비되셨나요?</div>
    <button class="btn-start" onclick="startQuiz()">START</button>
  </div>
</div>

<!-- ── QUIZ PLAY PAGE ── -->
<div class="page" id="page-quiz">
  <div class="quiz-card" id="quiz-card">
    <!-- injected by JS -->
  </div>
</div>

<!-- ── RESULT PAGE ── -->
<div class="page" id="page-result">
  <div class="result-card" id="result-card"></div>
</div>

<!-- ── STATS PAGE ── -->
<div class="page" id="page-stats">
  <div class="page-header">
    <div class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <h1>답변 통계</h1>
    <button class="btn btn-danger btn-sm" style="margin-left:auto;padding:0.4rem 0.8rem;font-size:0.8rem" onclick="clearAllStats()">초기화</button>
  </div>
  <div id="stats-content">
    <div class="stats-empty">로딩 중...</div>
  </div>
</div>

<!-- ── BUILDER PAGE ── -->
<div class="page" id="page-builder">
  <div class="page-header">
    <div class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <h1>퀴즈 관리</h1>
  </div>

  <div style="margin-bottom:1rem">
    <button type="button" class="btn btn-primary" id="btn-new-set">+ 새 퀴즈 세트 만들기</button>
  </div>

  <div class="sets-list" id="sets-list"></div>

  <div id="set-editor-wrap"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
