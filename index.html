<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/quiz.css">
</head>
<body>

<!-- Admin Icons (always visible) -->
<div class="admin-icons">
  <div class="admin-icon" id="icon-stats" title="통계 보기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
  </div>
  <div class="admin-icon" id="icon-builder" title="퀴즈 만들기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </div>
</div>

<!-- Settings Button (bottom-right, start page only) -->
<div class="settings-btn" id="settings-btn" title="화면 설정">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</div>

<!-- Settings Modal -->
<div class="settings-overlay" id="settings-modal">
  <div class="settings-box">
    <div class="settings-header">
      <h3>⚙️ 화면 설정</h3>
      <button class="settings-close-btn" onclick="closeSettingsModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="settings-section">
      <div class="settings-label">🖼️ 배경화면 이미지</div>
      <div class="settings-preview-wrap" id="bg-preview-wrap">
        <div class="settings-preview-placeholder" id="bg-preview-placeholder">미리보기</div>
        <img id="bg-preview-img" class="settings-preview-img" style="display:none" alt="배경 미리보기"/>
      </div>
      <div class="settings-row">
        <label class="btn btn-ghost settings-upload-btn">
          업로드
          <input type="file" accept="image/*" id="bg-upload-input" style="display:none" onchange="onBgUpload(event)"/>
        </label>
        <button class="btn btn-ghost" onclick="clearBgImage()">초기화</button>
      </div>
    </div>

    <div class="settings-divider"></div>

    <div class="settings-section">
      <div class="settings-label">🏷️ 로고 이미지</div>
      <div class="logo-preview-wrap" id="logo-preview-wrap">
        <div class="settings-preview-placeholder" id="logo-preview-placeholder">미리보기</div>
        <img id="logo-preview-img" class="logo-preview-img" style="display:none" alt="로고 미리보기"/>
      </div>
      <div class="settings-hint">업로드하면 상단 'QUIZ' 텍스트 대신 표시됩니다</div>
      <div class="settings-row">
        <label class="btn btn-ghost settings-upload-btn">
          업로드
          <input type="file" accept="image/*" id="logo-upload-input" style="display:none" onchange="onLogoUpload(event)"/>
        </label>
        <button class="btn btn-ghost" onclick="clearLogoImage()">초기화</button>
      </div>
    </div>
  </div>
</div>

<!-- Password Modal -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h3>🔒 관리자 인증</h3>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" maxlength="10" inputmode="numeric"/>
    <div class="modal-err" id="pw-err"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closePwModal()">취소</button>
      <button class="btn btn-primary" onclick="checkPassword()">확인</button>
    </div>
  </div>
</div>

<!-- Quiz Type Select Modal -->
<div class="type-select-overlay" id="type-modal">
  <div class="type-select-box">
    <h3>퀴즈 유형 선택</h3>
    <div class="type-btns">
      <div class="type-btn" onclick="addQuestion('short')">
        <div class="type-icon">✏️</div>
        주관식
      </div>
      <div class="type-btn" onclick="addQuestion('multi')">
        <div class="type-icon">☑️</div>
        객관식
      </div>
    </div>
    <div style="margin-top:1rem">
      <button class="btn btn-ghost full-w" onclick="closeTypeModal()">취소</button>
    </div>
  </div>
</div>

<!-- ── START PAGE ── -->
<div class="page active" id="page-start">
  <div class="start-inner">
    <!-- 로고: JS로 img 또는 텍스트 전환 -->
    <div class="start-logo-wrap" id="start-logo-wrap">
      <div class="start-title" id="start-title-text">QUIZ</div>
      <img id="start-logo-img" class="start-logo-img" style="display:none" alt="로고"/>
    </div>
    <div class="start-sub">준비되셨나요?</div>
    <button class="btn-start" onclick="startQuiz()">START</button>
  </div>
</div>

<!-- ── QUIZ PLAY PAGE ── -->
<div class="page" id="page-quiz">
  <div class="quiz-card" id="quiz-card">
    <!-- injected by JS -->
  </div>
</div>

<!-- ── RESULT PAGE ── -->
<div class="page" id="page-result">
  <div class="result-card" id="result-card"></div>
</div>

<!-- ── STATS PAGE ── -->
<div class="page" id="page-stats">
  <div class="page-header">
    <div class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <h1>답변 통계</h1>
    <button class="btn btn-danger btn-sm" style="margin-left:auto;padding:0.4rem 0.8rem;font-size:0.8rem" onclick="clearAllStats()">초기화</button>
  </div>
  <div id="stats-content">
    <div class="stats-empty">로딩 중...</div>
  </div>
</div>

<!-- ── BUILDER PAGE ── -->
<div class="page" id="page-builder">
  <div class="page-header">
    <div class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <h1>퀴즈 관리</h1>
  </div>

  <div style="margin-bottom:1rem">
    <button type="button" class="btn btn-primary" id="btn-new-set">+ 새 퀴즈 세트 만들기</button>
  </div>

  <div class="sets-list" id="sets-list"></div>

  <div id="set-editor-wrap"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
